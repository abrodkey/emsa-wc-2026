name: Update WC scores

on:
  schedule:
    - cron: "*/10 * * * *"     # every 10 minutes (GitHub schedules can lag a few min under load)
  workflow_dispatch: {}          # lets you run it on demand from the Actions tab
  push:
    branches: [main]
    paths-ignore:                # don't loop on the bot's own data commits
      - "results.json"
      - "scorers.json"

permissions:
  contents: write

concurrency:
  group: update-scores
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Compute group standings (results.json)
        run: node update-scores.mjs
      - name: Compute Golden Boot race (scorers.json)
        run: node update-scorers.mjs
      - name: Commit data if it changed
        run: |
          git config user.name "wc-score-bot"
          git config user.email "wc-score-bot@users.noreply.github.com"
          if git diff --quiet -- results.json scorers.json; then
            echo "No data change."
          else
            git add results.json scorers.json
            git commit -m "data: auto-update $(date -u +%FT%TZ)"
            git push
          fi
