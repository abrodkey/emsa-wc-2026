name: Update WC scores

on:
  schedule:
    - cron: "0 * * * *"        # top of every hour (GitHub may delay a few min)
  workflow_dispatch: {}          # lets you run it on demand from the Actions tab
  push:
    branches: [main]
    paths-ignore:
      - "results.json"           # don't loop on the bot's own commit

permissions:
  contents: write

concurrency:
  group: update-scores
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Compute live results
        run: node update-scores.mjs
      - name: Commit results.json if it changed
        run: |
          git config user.name "wc-score-bot"
          git config user.email "wc-score-bot@users.noreply.github.com"
          if git diff --quiet -- results.json; then
            echo "No score change."
          else
            git add results.json
            git commit -m "scores: auto-update $(date -u +%FT%TZ)"
            git push
          fi
